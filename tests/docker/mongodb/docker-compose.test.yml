# Build-only test for docker/mongodb.
# Verifies the image builds and the init script is in place.

services:
  mongodb:
    build:
      context: ../../../docker/mongodb
      dockerfile: dockerfile
    entrypoint: >
      sh -c "
        test -x /init.sh &&
        echo 'Success: build + layout check passed'
      "
    stop_grace_period: 3s
