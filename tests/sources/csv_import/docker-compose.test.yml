# timeout: 60
services:
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092
      - --advertise-kafka-addr internal://kafka:9092
      - --mode dev-container
      - --smp 1
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - test-network
    stop_grace_period: 3s
  csv-source:
    build:
      context: ../../../python/sources/csv_import
      dockerfile: dockerfile
    environment:
      - Quix__Broker__Address=kafka:9092
      - output=test-csv-output
    networks:
      - test-network
    depends_on:
      kafka:
        condition: service_healthy
    stop_grace_period: 3s
  test-runner:
    build:
      context: ../../framework
      dockerfile: Dockerfile
    command: >
      sh -c "
        echo 'Waiting for CSV import service to start...' &&
        sleep 5 &&
        echo 'Uploading CSV file...' &&
        python /tests/post_data.py &&
        echo 'Waiting for data to be published to Kafka...' &&
        sleep 3 &&
        echo 'Verifying output from Kafka...' &&
        python /tests/verify_output.py
      "
    environment:
      - Quix__Broker__Address=kafka:9092
      - TEST_OUTPUT_TOPIC=test-csv-output
      - CSV_SOURCE_HOST=csv-source
      - CSV_SOURCE_PORT=80
    volumes:
      - ./post_data.py:/tests/post_data.py:ro
      - ./verify_output.py:/tests/verify_output.py:ro
      - ./test_data.csv:/tests/test_data.csv:ro
    working_dir: /
    networks:
      - test-network
    depends_on:
      kafka:
        condition: service_healthy
      csv-source:
        condition: service_started
    stop_grace_period: 3s
networks:
  test-network:
    driver: bridge
